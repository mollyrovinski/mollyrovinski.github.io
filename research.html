    <script>
    function formatDate(dateStr) {
        if (!dateStr) return '';
        if (/^\d{4}-\d{2}$/.test(dateStr)) {
            const [year, month] = dateStr.split('-');
            return new Date(parseInt(year), parseInt(month) - 1, 1)
                .toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }
        return dateStr;
    }

    // Load research data from JSON file
    fetch('research-data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('research-content');
            let html = '';

            // Peer-Reviewed Journal Articles
            if (data.journalArticles && data.journalArticles.length > 0) {
                html += '<section class="research-section"><h2 class="section-title">Peer-Reviewed Journal Articles</h2>';
                data.journalArticles.forEach((paper, index) => {
                    html += `
                        <div class="publication-card">
                            <h3 class="pub-title">
                                ${paper.url ? `<a href="${paper.url}" target="_blank">${paper.title}</a>` : paper.title}
                            </h3>
                            ${paper.authors ? `<p class="pub-authors">${paper.authors}</p>` : ''}
                            ${(paper.venue || paper.date) ? `<p class="pub-venue">${[paper.venue, formatDate(paper.date)].filter(Boolean).join(', ')}</p>` : ''}
                            ${paper.abstract ? `
                                <div class="pub-actions">
                                    <button class="abstract-toggle" onclick="toggleAbstract('journal-abstract-${index}')">Show Abstract</button>
                                </div>
                                <div id="journal-abstract-${index}" class="abstract-content" style="display: none;">
                                    <p>${paper.abstract}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                html += '</section>';
            }

            // Working Papers
            if (data.workingPapers && data.workingPapers.length > 0) {
                html += '<section class="research-section"><h2 class="section-title">Working Papers</h2>';
                data.workingPapers.forEach((paper, index) => {
                    html += `
                        <div class="publication-card">
                            <h3 class="pub-title">
                                ${paper.url ? `<a href="${paper.url}" target="_blank">${paper.title}</a>` : paper.title}
                            </h3>
                            ${paper.authors ? `<p class="pub-authors">${paper.authors}</p>` : ''}
                            ${paper.note ? `
                                <p class="pub-note">
                                    ${paper.note.link ?
                                        paper.note.text.replace(paper.note.link.text, `<a href="${paper.note.link.url}" target="_blank">${paper.note.link.text}</a>`)
                                        : paper.note.text}
                                </p>
                            ` : ''}
                            ${paper.abstract ? `
                                <div class="pub-actions">
                                    <button class="abstract-toggle" onclick="toggleAbstract('working-abstract-${index}')">Show Abstract</button>
                                </div>
                                <div id="working-abstract-${index}" class="abstract-content" style="display: none;">
                                    <p>${paper.abstract}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                html += '</section>';
            }

            // Works in Progress
            if (data.worksInProgress && data.worksInProgress.length > 0) {
                html += '<section class="research-section"><h2 class="section-title">Works in Progress</h2><div class="wip-list">';
                data.worksInProgress.forEach(work => {
                    html += `
                        <div class="wip-item">
                            <h3>${work.title}</h3>
                            ${work.authors ? `<p class="pub-authors">${work.authors}</p>` : ''}
                            ${work.note ? `<p class="pub-note">${work.note}</p>` : ''}
                        </div>
                    `;
                });
                html += '</div></section>';
            }

            // Popular Writing
            if (data.popularArticles && data.popularArticles.length > 0) {
                html += '<section class="research-section"><h2 class="section-title">Popular Writing</h2>';
                data.popularArticles.forEach((article, index) => {
                    html += `
                        <div class="publication-card">
                            <h3 class="pub-title">
                                ${article.url ? `<a href="${article.url}" target="_blank">${article.title}</a>` : article.title}
                            </h3>
                            ${article.authors ? `<p class="pub-authors">${article.authors}</p>` : ''}
                            ${(article.venue || article.date) ? `<p class="pub-venue">${[article.venue, formatDate(article.date)].filter(Boolean).join(', ')}</p>` : ''}
                        </div>
                    `;
                });
                html += '</section>';
            }

            container.innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading research data:', error);
            document.getElementById('research-content').innerHTML = '<p>Error loading research data. Please try again later.</p>';
        });

    function toggleAbstract(id) {
        const abstract = document.getElementById(id);
        const button = event.target;
        if (abstract.style.display === 'none') {
            abstract.style.display = 'block';
            button.textContent = 'Hide Abstract';
        } else {
            abstract.style.display = 'none';
            button.textContent = 'Show Abstract';
        }
    }
    </script>
